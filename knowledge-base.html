<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘑法知识库 - 蘑法识界</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 统一颜色变量 */
        :root {
            --primary-orange: #FF9800;
            --primary-green: #4CAF50;
            --light-green: #8BC34A;
            --light-orange: #FFB74D;
            --warning-color: #FF9800;
            --success-color: #4CAF50;
            --toxic-color: #f44336;
            --medicinal-color: #FF9800;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f0f7f4;
            background-image: linear-gradient(to bottom right, #e9f5eb, #d4ede1);
            color: #2d4a3a;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        .mushroom-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="30" r="25" fill="%234CAF50"/><ellipse cx="50" cy="70" rx="30" ry="20" fill="%23FF9800"/></svg>');
            background-size: 120px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部区域 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(139, 195, 74, 0.3);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            font-size: 3.5rem;
            color: var(--primary-orange);
            filter: drop-shadow(0 0 8px rgba(255, 152, 0, 0.4));
        }
        
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--primary-orange), var(--primary-green), var(--light-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
        }
        
        /* 统一按钮样式 */
        .back-btn, .search-btn, .btn {
            background: linear-gradient(to right, var(--primary-green), var(--light-green));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            text-decoration: none;
        }
        
        .back-btn:hover, .search-btn:hover, .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(76, 175, 80, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(to right, var(--primary-orange), var(--light-orange));
        }
        
        .btn-secondary:hover {
            box-shadow: 0 6px 18px rgba(255, 152, 0, 0.4);
        }
        
        /* 搜索区域 */
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(139, 195, 74, 0.2);
            margin-bottom: 40px;
        }
        
        .search-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #c5e1a5;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .search-btn {
            background: linear-gradient(to right, #FF9800, #FFB74D);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }
        
        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }
        
        /* 多选分类筛选器容器 */
        .filter-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(139, 195, 74, 0.2);
            margin-bottom: 30px;
        }
        
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0f2e9;
        }
        
        .filter-header h3 {
            color: #FF9800;
            font-size: 1.4rem;
        }
        
        .clear-filters {
            background: #f0f7f4;
            color: #4CAF50;
            border: 1px solid #c5e1a5;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .clear-filters:hover {
            background: #4CAF50;
            color: white;
        }
        
        .filter-groups {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        
        .filter-group {
            margin-bottom: 10px;
        }
        
        .filter-group-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #2d4a3a;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-group-title i {
            color: #FF9800;
        }
        
        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-checkbox {
            display: none;
        }
        
        .filter-label {
            background-color: #f1f8e9;
            border: 1px solid #c5e1a5;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .filter-label:hover {
            background-color: #e8f5e9;
            transform: translateY(-2px);
        }
        
        .filter-checkbox:checked + .filter-label {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .filter-checkbox:checked + .filter-label .checkbox-icon {
            color: white;
        }
        
        .checkbox-icon {
            color: #4CAF50;
            font-size: 0.8rem;
        }
        
        .selected-filters {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0f2e9;
        }
        
        .selected-filters h4 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #2d4a3a;
        }
        
        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .selected-tag {
            background-color: #FF9800;
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .remove-tag {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 蘑菇图库 */
        .mushroom-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .mushroom-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(139, 195, 74, 0.2);
        }
        
        .mushroom-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }
        
        .mushroom-img {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mushroom-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .mushroom-info {
            padding: 20px;
        }
        
        .mushroom-info h3 {
            color: #FF9800;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .mushroom-info p {
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .mushroom-info strong {
            color: #4CAF50;
        }
        
        /* 蘑菇详情模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: modalFadeIn 0.3s ease-out;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            color: #999;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close-modal:hover {
            color: #FF9800;
        }
        
        .modal h3 {
            color: #FF9800;
            margin-bottom: 25px;
            font-size: 2rem;
        }
        
        .mushroom-detail-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            background-color: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: #4CAF50;
        }
        
        .detail-section {
            margin-bottom: 25px;
        }
        
        .detail-section h4 {
            color: #FF9800;
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .detail-item h5 {
            color: #4CAF50;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .warning-box {
            background-color: rgba(255, 152, 0, 0.1);
            border-left: 5px solid #FF9800;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 50px;
            color: #4CAF50;
            font-size: 0.9rem;
            border-top: 1px solid rgba(139, 195, 74, 0.3);
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(139, 195, 74, 0.3);
            border-radius: 50%;
            border-top-color: #FF9800;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .header-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            
            .search-container {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
                justify-content: center;
            }
            
            .mushroom-gallery {
                grid-template-columns: 1fr;
            }
            
            .filter-groups {
                grid-template-columns: 1fr;
            }
        }
        
        /* 漂浮蘑菇动画 */
        .fungus-animation {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.3;
            z-index: -1;
            font-size: 2rem;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        /* 可食用性标签 */
        .edibility-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .edible {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        
        .toxic {
            background-color: #ffebee;
            color: #c62828;
        }
        
        .medicinal {
            background-color: #fff3e0;
            color: #ef6c00;
        }
        
        .poisonous {
            background-color: #fce4ec;
            color: #880e4f;
        }
        
        .unknown {
            background-color: #f5f5f5;
            color: #616161;
        }
        
        /* 知识库统计 */
        .stats-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .stat-item {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(139, 195, 74, 0.2);
            flex: 1;
            min-width: 200px;
        }
        
        .stat-number {
            font-size: 2.5rem;
            color: #FF9800;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #4CAF50;
            font-size: 1rem;
        }
        
        /* 扩展信息样式 */
        .extra-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        
        .extra-info-item {
            background-color: #f9fdf7;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #8BC34A;
        }
        
        .extra-info-item h6 {
            color: #4CAF50;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }
        
        @media (max-width: 768px) {
            .extra-info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="mushroom-bg"></div>
    
    <!-- 漂浮的蘑菇动画 -->
    <div class="fungus-animation" style="top:10%; left:5%; animation: float 6s ease-in-out infinite;">🍄</div>
    <div class="fungus-animation" style="top:20%; right:8%; animation: float 8s ease-in-out infinite 1s;">🍄</div>
    <div class="fungus-animation" style="bottom:30%; left:8%; animation: float 7s ease-in-out infinite 0.5s;">🍄</div>
    
    <div class="container">
        <!-- 头部区域 -->
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-book-open logo-icon"></i>
                <div>
                    <h1>蘑法知识库</h1>
                    <p style="color: #4CAF50; margin-top: 5px;">全面了解真菌世界，掌握蘑菇的奥秘</p>
                </div>
            </div>
            <a href="mushroom.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回识别局
            </a>
        </div>
        
        <!-- 知识库统计 -->
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-number" id="totalMushrooms">0</div>
                <div class="stat-label">蘑菇种类</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="edibleCount">0</div>
                <div class="stat-label">可食用蘑菇</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="toxicCount">0</div>
                <div class="stat-label">有毒蘑菇</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="medicinalCount">0</div>
                <div class="stat-label">药用蘑菇</div>
            </div>
        </div>
        
        <!-- 搜索和筛选区域 -->
        <section class="search-section">
            <h2><i class="fas fa-search"></i> 搜索蘑菇知识</h2>
            <p>通过名称、特征或可食用性快速查找您感兴趣的蘑菇</p>
            
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="输入蘑菇名称或特征进行搜索...">
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
        </section>
        
        <!-- 多选分类筛选器 -->
        <div class="filter-container">
            <div class="filter-header">
                <h3><i class="fas fa-filter"></i> 分类筛选</h3>
                <button class="clear-filters" id="clearFilters">
                    <i class="fas fa-times"></i> 清除筛选
                </button>
            </div>
            
            <div class="filter-groups">
                <!-- 可食用性组 -->
                <div class="filter-group">
                    <div class="filter-group-title">
                        <i class="fas fa-utensils"></i> 可食用性
                    </div>
                    <div class="filter-options">
                        <input type="checkbox" class="filter-checkbox" id="edible-filter" value="edible">
                        <label class="filter-label" for="edible-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            可食用
                        </label>
                        
                        <input type="checkbox" class="filter-checkbox" id="toxic-filter" value="toxic">
                        <label class="filter-label" for="toxic-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            有毒
                        </label>
                        
                        <input type="checkbox" class="filter-checkbox" id="poisonous-filter" value="poisonous">
                        <label class="filter-label" for="poisonous-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            剧毒
                        </label>
                        
                        <input type="checkbox" class="filter-checkbox" id="medicinal-filter" value="medicinal">
                        <label class="filter-label" for="medicinal-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            药用
                        </label>
                    </div>
                </div>
                
                <!-- 常见程度组 -->
                <div class="filter-group">
                    <div class="filter-group-title">
                        <i class="fas fa-chart-line"></i> 常见程度
                    </div>
                    <div class="filter-options">
                        <input type="checkbox" class="filter-checkbox" id="common-filter" value="common">
                        <label class="filter-label" for="common-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            常见
                        </label>
                        
                        <input type="checkbox" class="filter-checkbox" id="rare-filter" value="rare">
                        <label class="filter-label" for="rare-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            稀有
                        </label>
                    </div>
                </div>
                
                <!-- 生长方式组 -->
                <div class="filter-group">
                    <div class="filter-group-title">
                        <i class="fas fa-tree"></i> 生长方式
                    </div>
                    <div class="filter-options">
                        <input type="checkbox" class="filter-checkbox" id="wild-filter" value="wild">
                        <label class="filter-label" for="wild-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            野生
                        </label>
                        
                        <input type="checkbox" class="filter-checkbox" id="cultivated-filter" value="cultivated">
                        <label class="filter-label" for="cultivated-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            栽培
                        </label>
                        
                        <input type="checkbox" class="filter-checkbox" id="symbiotic-filter" value="symbiotic">
                        <label class="filter-label" for="symbiotic-filter">
                            <span class="checkbox-icon"><i class="fas fa-check"></i></span>
                            共生
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="selected-filters">
                <h4>已选筛选条件：</h4>
                <div class="selected-tags" id="selectedTags">
                    <!-- 已选标签将在这里动态生成 -->
                    <div class="selected-tag" style="background-color: #f1f8e9; color: #2d4a3a;">
                        无筛选条件
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 蘑菇图库 -->
        <section id="mushroomList">
            <h2><i class="fas fa-th-large"></i> 蘑菇知识库</h2>
            <p>点击任意蘑菇卡片查看详细信息</p>
            
            <!-- 加载动画 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在加载蘑法知识库...</p>
            </div>
            
            <!-- 蘑菇列表将通过JavaScript动态生成 -->
            <div class="mushroom-gallery" id="mushroomGallery"></div>

        let currentFilters = {
            edibility: [], // 可食用性
            category: []   // 其他 category 标签（common, rare, wild, cultivated, symbiotic 等）
        };
        let currentSearch = '';
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 显示加载动画
            loading.style.display = 'block';
            
            // 模拟数据加载延迟
            setTimeout(() => {
                // 更新统计数据
                updateStats();
                
                // 生成蘑菇图库
                generateMushroomGallery();
                
                // 更新已选标签显示
                updateSelectedTags();
                
                // 隐藏加载动画
                loading.style.display = 'none';
            }, 800);
            
            // 绑定搜索事件
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
            
            // 绑定筛选器事件
            filterCheckboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const value = this.value;
                    const group = this.id.split('-')[0]; // 通过 id 前缀区分组，如 edible-filter 的前缀是 edible
                    
                    // 根据分组更新 currentFilters
                    if (group === 'edible' || group === 'toxic' || group === 'poisonous' || group === 'medicinal') {
                        // 可食用性组，使用 edibility 数组
                        if (this.checked) {
                            if (!currentFilters.edibility.includes(value)) {
                                currentFilters.edibility.push(value);
                            }
                        } else {
                            currentFilters.edibility = currentFilters.edibility.filter(v => v !== value);
                        }
                    } else {
                        // 其他组（common, rare, wild, cultivated, symbiotic），使用 category 数组
                        if (this.checked) {
                            if (!currentFilters.category.includes(value)) {
                                currentFilters.category.push(value);
                            }
                        } else {
                            currentFilters.category = currentFilters.category.filter(v => v !== value);
                        }
                    }
                    
                    // 更新已选标签显示
                    updateSelectedTags();
                    
                    // 重新筛选蘑菇
                    filterMushrooms();
                });

            // 绑定清除筛选按钮事件
            clearFiltersBtn.addEventListener('click', function() {
                // 清除所有复选框的选中状态
                filterCheckboxes.forEach(checkbox => {
                    checkbox.checked = false;
                });
                
                // 清空筛选器数组
                currentFilters = {
                    edibility: [],
                    category: []
                };
                
                // 更新已选标签显示
                updateSelectedTags();
                
                // 重新筛选蘑菇
                filterMushrooms();
            });

            closeDetailModal.addEventListener('click', () => {

        // 更新已选标签显示
        function updateSelectedTags() {
            selectedTagsContainer.innerHTML = '';
            
            // 合并所有筛选器
            const allFilters = [
                ...currentFilters.edibility.map(v => {
                    // 将值转换为显示文本
                    switch(v) {
                        case 'edible': return '可食用';
                        case 'toxic': return '有毒';
                        case 'poisonous': return '剧毒';
                        case 'medicinal': return '药用';
                        default: return v;
                    }
                }),
                ...currentFilters.category.map(v => {
                    switch(v) {
                        case 'common': return '常见';
                        case 'rare': return '稀有';
                        case 'wild': return '野生';
                        case 'cultivated': return '栽培';
                        case 'symbiotic': return '共生';
                        default: return v;
                    }
                })
            ];
            
            if (allFilters.length === 0) {
                selectedTagsContainer.innerHTML = `
                    <div class="selected-tag" style="background-color: #f1f8e9; color: #2d4a3a;">
                        无筛选条件
                    </div>
                `;
                return;
            }
            
            // 为每个已选标签创建一个元素
            allFilters.forEach(filter => {
                const tagElement = document.createElement('div');
                tagElement.className = 'selected-tag';
                
                // 根据类型设置不同颜色
                let bgColor = '#4CAF50'; // 默认绿色
                if (filter === '可食用' || filter === '常见' || filter === '野生' || filter === '栽培' || filter === '共生') {
                    bgColor = '#4CAF50';
                } else if (filter === '有毒' || filter === '剧毒') {
                    bgColor = '#f44336';
                } else if (filter === '药用' || filter === '稀有') {
                    bgColor = '#FF9800';
                }
                
                tagElement.style.backgroundColor = bgColor;
                
                tagElement.innerHTML = `
                    ${filter}
                    <button class="remove-tag" data-filter="${filter}">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                
                selectedTagsContainer.appendChild(tagElement);
            });
            
            // 为移除按钮添加事件
            const removeButtons = document.querySelectorAll('.remove-tag');
            removeButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const filterText = this.getAttribute('data-filter');
                    let filterValue = filterText;
                    
                    // 将显示文本转换回实际值
                    switch(filterText) {
                        case '可食用': filterValue = 'edible'; break;
                        case '有毒': filterValue = 'toxic'; break;
                        case '剧毒': filterValue = 'poisonous'; break;
                        case '药用': filterValue = 'medicinal'; break;
                        case '常见': filterValue = 'common'; break;
                        case '稀有': filterValue = 'rare'; break;
                        case '野生': filterValue = 'wild'; break;
                        case '栽培': filterValue = 'cultivated'; break;
                        case '共生': filterValue = 'symbiotic'; break;
                    }
                    
                    // 从对应数组中移除
                    if (['edible', 'toxic', 'poisonous', 'medicinal'].includes(filterValue)) {
                        currentFilters.edibility = currentFilters.edibility.filter(v => v !== filterValue);
                    } else {
                        currentFilters.category = currentFilters.category.filter(v => v !== filterValue);
                    }
                    
                    // 找到对应的复选框并取消选中
                    const checkbox = Array.from(filterCheckboxes).find(cb => cb.value === filterValue);
                    if (checkbox) checkbox.checked = false;
                    
                    // 更新显示和重新筛选
                    updateSelectedTags();
                    filterMushrooms();
                });
            });
        }
        
        // 更新统计数据
        function updateStats() {
            const total = mushroomDatabase.length;
            const edible = mushroomDatabase.filter(m => m.edibility === 'edible').length;
            const toxic = mushroomDatabase.filter(m => m.edibility === 'toxic' || m.edibility === 'poisonous').length;
            const medicinal = mushroomDatabase.filter(m => m.edibility === 'medicinal').length;
            
            // 动画显示统计数据
            animateCount(totalMushrooms, total);
            animateCount(edibleCount, edible);
            animateCount(toxicCount, toxic);
            animateCount(medicinalCount, medicinal);
        }
        
        // 数字动画
        function animateCount(element, target) {
            let current = 0;
            const increment = target / 50; // 分50步完成
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current);
            }, 20);
        }

        // 过滤蘑菇列表
        function filterMushroomList() {
            return mushroomDatabase.filter(mushroom => {
                // 按搜索词过滤
                if (currentSearch) {
                    const searchTerm = currentSearch.toLowerCase();
                    const nameMatch = mushroom.name.toLowerCase().includes(searchTerm);
                    const sciMatch = mushroom.scientificName.toLowerCase().includes(searchTerm);
                    const descMatch = mushroom.description.toLowerCase().includes(searchTerm);
                    const charMatch = mushroom.characteristics.toLowerCase().includes(searchTerm);
                    
                    if (!(nameMatch || sciMatch || descMatch || charMatch)) {
                        return false;
                    }
                }
                
                // 按多选筛选器过滤
                const hasEdibilityFilters = currentFilters.edibility.length > 0;
                const hasCategoryFilters = currentFilters.category.length > 0;
                
                if (!hasEdibilityFilters && !hasCategoryFilters) {
                    return true;
                }
                
                // 检查可食用性（edibility）筛选：同一组内是“或”关系
                if (hasEdibilityFilters) {
                    if (!currentFilters.edibility.includes(mushroom.edibility)) {
                        return false;
                    }
                }
                
                // 检查 category 筛选：同一组内是“或”关系，需要与 mushroom.category 数组有交集
                if (hasCategoryFilters) {
                    const categoryIntersection = currentFilters.category.filter(cat => mushroom.category.includes(cat));
                    if (categoryIntersection.length === 0) {
                        return false;
                    }
                }
                
                return true;
            });
        }

                        <div class="detail-item">
                            <h5><i class="fas fa-tree"></i> 生长环境</h5>
                            <p>${mushroom.habitat}</p>
                        </div>
                        <div class="detail-item">
                            <h5><i class="far fa-calendar-alt"></i> 季节</h5>
                            <p>${mushroom.season}</p>
                        </div>
                        <div class="detail-item">
                            <h5><i class="fas fa-globe-asia"></i> 分布区域</h5>
                            <p>${mushroom.distribution}</p>
                        </div>
                        <div class="detail-item">
                            <h5><i class="fas fa-tags"></i> 用途</h5>
                            <p>${mushroom.uses.join('、')}</p>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h4><i class="fas fa-align-left"></i> 描述</h4>
                        <p>${mushroom.description}</p>
                    </div>

                    ${extraInfoHTML}

                    <div class="detail-section">
                        <h4><i class="fas fa-search"></i> 识别特征</h4>
                        <p>${mushroom.characteristics}</p>
                    </div>

                    <div class="warning-box">

                    </div>

                    <button class="search-btn" style="margin-top: 25px;" onclick="detailModal.style.display='none'">

                    </button>
                `;

                detailModal.style.display = 'flex';
            }
        }
    </script>
